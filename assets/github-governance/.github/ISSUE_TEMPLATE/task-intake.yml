name: AI Task Intake
description: Create a structured AI大管家 task record in the central ops repo.
title: "[implement/ops] task-slug | 中文标题"
labels:
  - state:intake
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should be done?
      placeholder: Describe the meaningful task request.
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - research
        - spec
        - implement
        - debug
        - review
        - sync
        - publish
        - governance
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - github
        - feishu
        - openai
        - skill-system
        - content
        - data
        - ops
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification Targets
      description: What must be true before this task counts as complete?
      placeholder: List the artifact check and goal check.
