view_specs:
  - dashboard: 康波周期总控舱
    table: L1_康波事件信号
    view_name: view-hero-current-signal
    display_fields: [event_name, event_date, event_category, kangbo_phase, severity, event_summary, scenario_shift]
    sort_notes:
      - 当前只有 1 条 live 信号，后续扩成事件流时按 event_date 倒序手动补充
  - dashboard: 康波周期总控舱
    table: 时间事件主表
    view_name: view-kpi-event-distribution
    display_fields: [事件名称, 事件类别, 康波阶段, 国家|地区, 可信度]
    sort_notes:
      - 图表按事件类别聚合
  - dashboard: 康波周期总控舱
    table: 时间事件主表
    view_name: view-kpi-phase-distribution
    display_fields: [事件名称, 康波阶段, 年份, 国家|地区]
    sort_notes:
      - 图表按康波阶段聚合
  - dashboard: 康波周期总控舱
    table: L2_资产信号映射
    view_name: view-kpi-asset-basket
    display_fields: [asset_class, asset_name, direction, confidence, position_action]
    sort_notes:
      - 先按 asset_class 分组，再按 direction 手动排序
  - dashboard: 康波周期总控舱
    table: L1_康波事件信号
    view_name: view-diagnosis-current-event
    display_fields: [event_name, event_date, event_category, kangbo_phase, severity, event_summary, causal_chain, source_article, scenario_shift]
  - dashboard: 康波周期总控舱
    table: L1_历史镜像
    view_name: view-diagnosis-historical-mirror
    display_fields: [kangbo_event_id, kangbo_event_name, analogy_type, similarity_score, analogy_reasoning, key_difference, historical_asset_impact]
    sort_notes:
      - 按 similarity_score 降序手动补充
  - dashboard: 康波周期总控舱
    table: 国家地区主线表
    view_name: view-diagnosis-phase-context
    display_fields: [主线ID, 国家|地区, 时间范围, 主线摘要, 关键转折点, 关联阶段]
    sort_notes:
      - 当前阶段主线卡默认从地区主线表切入，主题图层与阶段原表通过深入页承接
  - dashboard: 康波周期总控舱
    table: L2_资产信号映射
    view_name: view-action-asset-basket
    display_fields: [asset_class, asset_name, direction, position_action, stop_rule, confidence]
    sort_notes:
      - 只显示篮子方向与风控句，不给具体仓位
  - dashboard: 康波周期总控舱
    table: L2_资产信号映射
    view_name: view-action-entrepreneur-translation
    display_fields: [asset_class, asset_name, direction, position_action, stop_rule, historical_reference]
    sort_notes:
      - 页面文案需翻译成现金流、供应链、扩张节奏、防御储备语言
  - dashboard: 300年事件库
    table: 时间事件主表
    view_name: view-library-events-timeline
    display_fields: [年份, 事件名称, 康波阶段, 事件类别, 国家|地区, 结构化摘要, 影响方向, 来源ID, 可信度]
    sort_notes:
      - 按年份升序手动排序
  - dashboard: 阶段解剖页
    table: 康波阶段表
    view_name: view-library-phase-profile
    display_fields: [KB02, 革命战争与欧洲重组, '1789', '1815', 战争冲击, 法国、英国、欧洲大陆, 蒸汽机、运河、军需工业, 法兰西革命与拿破仑战争重塑欧洲秩序, 战争融资、贸易封锁、财政信用再分配, 法国大革命 | 拿破仑战争 | 维也纳会议]
    sort_notes:
      - live 表当前是导入后的原始列头形态，适合作为原表证据，不适合直接做精细化筛选
  - dashboard: 阶段解剖页
    table: 主题图层表
    view_name: view-library-theme-layer
    display_fields: [图层ID, 图层名称, 定义, 主要问题, 典型事件]
  - dashboard: 阶段解剖页
    table: 国家地区主线表
    view_name: view-library-region-mainline
    display_fields: [主线ID, 国家|地区, 时间范围, 主线摘要, 关键转折点, 关联阶段]

card_specs:
  康波周期总控舱:
    - name: 当前阶段与风险温度
      type: 指标卡/明细表卡
      table: L1_康波事件信号
      view: view-hero-current-signal
      fields: [event_name, event_date, event_category, kangbo_phase, severity, scenario_shift]
      purpose: 让用户 30 秒内知道现在处于哪个阶段、风险温度大致如何
    - name: 历史冲击类别分布
      type: 柱状图
      table: 时间事件主表
      view: view-kpi-event-distribution
      dimension: 事件类别
      metric: 记录数
      purpose: 看 79 条历史事件里哪种冲击最常见
    - name: 历史阶段分布
      type: 柱状图
      table: 时间事件主表
      view: view-kpi-phase-distribution
      dimension: 康波阶段
      metric: 记录数
      purpose: 看历史样本主要堆积在哪些阶段
    - name: 资产篮子姿态
      type: 环形图/明细表卡
      table: L2_资产信号映射
      view: view-kpi-asset-basket
      dimension: direction
      metric: 记录数
      purpose: 用强多、多、中性、空、强空快速建立资产姿态直觉
    - name: 当前关键事件卡
      type: 明细表卡
      table: L1_康波事件信号
      view: view-diagnosis-current-event
      fields: [event_name, event_date, event_category, kangbo_phase, severity, event_summary, causal_chain, source_article, scenario_shift]
      purpose: 一张卡回答发生了什么、为什么重要、情景如何变化
    - name: 历史镜像卡
      type: 明细表卡/对照卡
      table: L1_历史镜像
      view: view-diagnosis-historical-mirror
      fields: [kangbo_event_id, kangbo_event_name, analogy_type, similarity_score, analogy_reasoning, key_difference]
      purpose: 让用户看到像在哪里，又不一样在哪里
    - name: 阶段主线卡
      type: 明细表卡
      table: 国家地区主线表
      view: view-diagnosis-phase-context
      fields: [国家|地区, 时间范围, 主线摘要, 关键转折点, 关联阶段]
      purpose: 把当前事件重新挂回长期阶段逻辑
    - name: 资产篮子方向
      type: 明细表卡
      table: L2_资产信号映射
      view: view-action-asset-basket
      fields: [asset_class, asset_name, direction, position_action, stop_rule, confidence]
      purpose: 给出篮子方向、理由和风险提示，不给下单指令
    - name: 企业经营动作
      type: 明细表卡
      table: L2_资产信号映射
      view: view-action-entrepreneur-translation
      fields: [asset_class, asset_name, direction, position_action, stop_rule, historical_reference]
      purpose: 把资产语言翻译成企业经营动作建议

  300年事件库:
    - name: 300年事件长轴
      type: 明细表卡
      table: 时间事件主表
      view: view-library-events-timeline
      fields: [年份, 事件名称, 康波阶段, 事件类别, 国家|地区, 结构化摘要, 来源ID, 可信度]
      purpose: 作为事件长轴页主体，优先保证可读性
    - name: 事件类别结构
      type: 柱状图
      table: 时间事件主表
      view: view-library-events-timeline
      dimension: 事件类别
      metric: 记录数
      purpose: 看冲击类型结构
    - name: 康波阶段分布
      type: 柱状图
      table: 时间事件主表
      view: view-library-events-timeline
      dimension: 康波阶段
      metric: 记录数
      purpose: 看历史事件在哪些阶段最密集
    - name: 国家地区重心
      type: 条形图
      table: 时间事件主表
      view: view-library-events-timeline
      dimension: 国家|地区
      metric: 记录数
      purpose: 看历史事件地理重心
    - name: 影响方向扫描
      type: 条形图
      table: 时间事件主表
      view: view-library-events-timeline
      dimension: 影响方向
      metric: 记录数
      purpose: 看冲击更偏供给、需求还是制度
    - name: 可信度分布
      type: 环形图
      table: 时间事件主表
      view: view-library-events-timeline
      dimension: 可信度
      metric: 记录数
      purpose: 让用户知道样本证据强弱

  阶段解剖页:
    - name: 阶段档案原表
      type: 明细表卡
      table: 康波阶段表
      view: view-library-phase-profile
      fields: [KB02, 革命战争与欧洲重组, '1789', '1815', 战争冲击, 法国、英国、欧洲大陆, 蒸汽机、运河、军需工业]
      purpose: 保留旧导入表原貌作为证据底稿，并提示后续需要结构化修复
    - name: 国家地区主线
      type: 明细表卡
      table: 国家地区主线表
      view: view-library-region-mainline
      fields: [国家|地区, 时间范围, 主线摘要, 关键转折点, 关联阶段]
      purpose: 解释不同国家地区如何穿越多个阶段
    - name: 主题图层解释
      type: 明细表卡
      table: 主题图层表
      view: view-library-theme-layer
      fields: [图层名称, 定义, 主要问题, 典型事件]
      purpose: 解释战争、技术、制度等图层如何叠加影响阶段

  当前局势页:
    - name: 当前事件链路
      type: 明细表卡
      table: L1_康波事件信号
      view: view-diagnosis-current-event
      fields: [event_id, event_name, event_date, event_category, kangbo_phase, impact_direction, severity, causal_chain, scenario_shift]
      purpose: 把 source_event_id=KBS-202602-001 的链路讲清楚
    - name: 历史镜像对照
      type: 明细表卡
      table: L1_历史镜像
      view: view-diagnosis-historical-mirror
      fields: [kangbo_event_id, kangbo_event_name, analogy_type, similarity_score, analogy_reasoning, key_difference, historical_asset_impact]
      purpose: 给当前局势页提供镜像参照
    - name: 当前资产方向
      type: 明细表卡
      table: L2_资产信号映射
      view: view-action-asset-basket
